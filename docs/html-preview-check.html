<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HTML Preview Check</title>
  <link rel="stylesheet" href="html-preview-check.css">
</head>
<body>
  <main class="preview-check">
    <p class="eyebrow">reader html preview</p>
    <h1>HTML preview is rendering this file</h1>
    <p class="lead">
      This page is <strong>docs/html-preview-check.html</strong>. If you see this green panel,
      the selected HTML file is being rendered as HTML.
    </p>
    <section class="status-grid" aria-label="verification status">
      <div>
        <span class="label">HTML</span>
        <span class="value">rendered</span>
      </div>
      <div>
        <span class="label">relative CSS</span>
        <span class="value">loaded</span>
      </div>
      <div>
        <span class="label">script</span>
        <span class="value">not required</span>
      </div>
    </section>
  </main>
</body>
</html>
